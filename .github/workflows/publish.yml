name: Publish to PyPI

on:
  release:
    types: [published]
  push:
    tags: ["v*"]

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build
        run: uv build

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/p/cc-plugin-to-codex
    permissions:
      # Required for PyPI Trusted Publishing (OIDC). Configure once at:
      #   https://pypi.org/manage/account/publishing/
      # with:
      #   PyPI project    : cc-plugin-to-codex
      #   Owner / Repo    : fangzzzjjj / cc-plugin-to-codex
      #   Workflow name   : publish.yml
      #   Environment name: pypi
      id-token: write
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
